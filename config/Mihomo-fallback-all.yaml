# ========================
# Mihomo-fallback-all 优化配置
# ========================
# 跑裸核用户请自行去掉下方控制面板模块的注释

# 机场订阅（多节点直接复制下方代码并更新订阅链接即可，注意名称不可重复）
proxy-providers:
  Airport1:
    url: "https://dbsub2.whtjdasha.com/s/45314f645776fc5b5629f3a33db1ec8d"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 直连
    
  Airport2:
    url: "https://ymjc.cfd/api/v1/client/subscribe?token=587bb897f020f9f2c52dfdd47b09cfe0"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 直连

# 节点信息
proxies:
  - {name: 直连, type: direct}

# 全局配置 
mixed-port: 7890
allow-lan: true
bind-address: "*"
ipv6: false
unified-delay: true
tcp-concurrent: true
log-level: warning
global-client-fingerprint: chrome
keep-alive-idle: 600
keep-alive-interval: 15

profile:
  store-selected: true
  store-fake-ip: true

# 控制面板
# external-controller: 0.0.0.0:9090
# external-ui: ui
# external-ui-name: zashboard
# external-ui-url: https://gh-proxy.com/github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip
# secret: ""

# 嗅探（fakeip下其实可以不用嗅探）
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

# 入站TUN（建议开启，兼容游戏UDP）
tun:
  enable: true
  # system/gvisor/mixed
  stack: mixed
  endpoint-independent-nat: true
  strict-route: false
  dns-hijack: ["any:53", "tcp://any:53"]
  #使用仅内核自行修改下面三项为true
  auto-route: false
  auto-redirect: false
  auto-detect-interface: false

# DNS（防泄露核心）
dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - +.lan
    - +.local
    - geosite:cn
    - "rule-set:fakeipfilter_domain"
    
  default-nameserver:
    - https://223.5.5.5/dns-query
  direct-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query    
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver:
    - https://8.8.8.8/dns-query#RULES&ecs=223.5.5.0/24

# 策略组定义
default: &default
  type: select
  proxies:
    - 直连
    - 🌐 所有-手动
    - ♻ 所有-自动
    - 🇭🇰 香港-故转
    - 🇹🇼 台湾-故转
    - 🇯🇵 日本-故转
    - 🇸🇬 狮城-故转
    - 🇺🇲 美国-故转
    - 📊 其他-故转
    
proxy-groups:

  # 业务分流组

  - {name: 🚀 默认代理, <<: *default}
  - {name: 📺 YouTube, <<: *default}
  - {name: 🔍 Google, <<: *default}
  - {name: 🤖 Ai, <<: *default}
  - {name: 📦 GitHub, <<: *default}
  - {name: 📲 Telegram, <<: *default}
  - {name: 💬 Social, <<: *default}
  - {name: 🎥 TikTok, <<: *default}
  - {name: 🎮 Games, <<: *default}
  - {name: 🍎 Apple, <<: *default}
  - {name: 📰 Microsoft, <<: *default}
  - {name: 🐬 漏网之鱼, <<: *default}
  
  # ===== 故障转移 =====

  - {name: 🇭🇰 香港-故转, type: fallback, interval: 600, lazy: false, proxies: [ 🇭🇰 香港-手动, 🇭🇰 香港-自动]}
  - {name: 🇹🇼 台湾-故转, type: fallback, interval: 600, lazy: false, proxies: [ 🇹🇼 台湾-手动, 🇹🇼 台湾-自动]}
  - {name: 🇺🇲 美国-故转, type: fallback, interval: 600, lazy: false, proxies: [ 🇺🇲 美国-手动, 🇺🇲 美国-自动]}
  - {name: 🇸🇬 狮城-故转, type: fallback, interval: 600, lazy: false, proxies: [ 🇸🇬 狮城-手动, 🇸🇬 狮城-自动]}
  - {name: 🇯🇵 日本-故转, type: fallback, interval: 600, lazy: false, proxies: [ 🇯🇵 日本-手动, 🇯🇵 日本-自动]}
  - {name: 📊 其他-故转, type: fallback, interval: 600, lazy: false, proxies: [ 🔯 其他-手动, ♻️ 其他-自动]}
  
  # ===== 手动选择 =====

  - {name: 🌐 所有-手动, type: select, include-all: true, filter: "^((?!(直连|拒绝)).)*$"}
  - {name: 🇭🇰 香港-手动, type: select, include-all: true, filter: "(?=.*(广港|香港|HK|Hong Kong|🇭🇰|HongKong)).*$" }
  - {name: 🇹🇼 台湾-手动, type: select, include-all: true, filter: "(?=.*(广台|台湾|台灣|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan|Taiwan)).*$" }
  - {name: 🇺🇲 美国-手动, type: select, include-all: true, filter: "(?=.*(广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States)).*$" }
  - {name: 🇸🇬 狮城-手动, type: select, include-all: true, filter: "(?=.*(广新|新加坡|SG|坡|狮城|🇸🇬|Singapore)).*$" }
  - {name: 🇯🇵 日本-手动, type: select, include-all: true, filter: "(?=.*(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan)).*$" }
  - {name: 🔯 其他-手动, type: select, include-all: true, filter: "^((?!(直连|拒绝|广港|香港|HK|Hong Kong|🇭🇰|HongKong|广台|台湾|台灣|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan|Taiwan|广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan|广新|新加坡|SG|坡|狮城|🇸🇬|Singapore|广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States)).)*$" }

  # ===== 自动选择 =====
  
  - {name: ♻ 所有-自动, type: url-test, include-all: true, tolerance: 50, interval: 600, filter: "^((?!(直连|拒绝)).)*$"}
  - {name: 🇭🇰 香港-自动, type: url-test, include-all: true, tolerance: 50, interval: 600, filter: "(?=.*(广港|香港|HK|Hong Kong|🇭🇰|HongKong)).*$"}
  - {name: 🇹🇼 台湾-自动, type: url-test, include-all: true, tolerance: 50, interval: 600, filter: "(?=.*(广台|台湾|台灣|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan|Taiwan)).*$"}
  - {name: 🇺🇲 美国-自动, type: url-test, include-all: true, tolerance: 50, interval: 600, filter: "(?=.*(广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States)).*$"}
  - {name: 🇸🇬 狮城-自动, type: url-test, include-all: true, tolerance: 50, interval: 600, filter: "(?=.*(广新|新加坡|SG|坡|狮城|🇸🇬|Singapore)).*$"}
  - {name: 🇯🇵 日本-自动, type: url-test, include-all: true, tolerance: 50, interval: 600, filter: "(?=.*(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan)).*$"}
  - {name: ♻️ 其他-自动, type: url-test, include-all: true, tolerance: 50, interval: 600, filter: "^((?!(直连|拒绝|广港|香港|HK|Hong Kong|🇭🇰|HongKong|广台|台湾|台灣|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan|Taiwan|广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan|广新|新加坡|SG|坡|狮城|🇸🇬|Singapore|广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States)).)*$" }
 
# ===== 规则匹配 =====
rules:
  - RULE-SET,private_ip,直连,no-resolve
  - RULE-SET,private_domain,直连
  - RULE-SET,proxylite,🚀 默认代理
  
  - RULE-SET,ai-!cn,🤖 Ai
  - RULE-SET,github_domain,📦 GitHub
  - RULE-SET,whatsapp_domain,💬 Social
  - RULE-SET,facebook_domain,💬 Social
  - RULE-SET,apple_domain,🍎 Apple
  - RULE-SET,apple_ip,🍎 Apple,no-resolve
  - RULE-SET,microsoft_domain,📰 Microsoft
  - RULE-SET,youtube_domain,📺 YouTube
  - RULE-SET,tiktok_domain,🎥 TikTok
  - RULE-SET,steam_domain,🎮 Games
  - RULE-SET,steamcn_domain,直连 
  - RULE-SET,google_domain,🔍 Google
  - RULE-SET,google_ip,🔍 Google,no-resolve
  - RULE-SET,telegram_ip,📲 Telegram,no-resolve
  - RULE-SET,telegram_domain,📲 Telegram
  
  - RULE-SET,geolocation-!cn,🚀 默认代理
  
  - RULE-SET,cn_domain,直连
  - RULE-SET,cn_ip,直连
  
  - MATCH,🐬 漏网之鱼
  
